# Configuración de Nginx para optimizar PageSpeed Insights
# Este archivo debe incluirse en tu configuración de nginx

# Cache para archivos estáticos y media
location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    # Cache por 30 días para estos archivos
    expires 30d;
    add_header Cache-Control "public, immutable, max-age=2592000";
    add_header Vary "Accept-Encoding";
    
    # Compresión gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 1000;
}

# Cache para WebP (máxima prioridad - navegadores modernos)
location ~* \.(webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header Vary "Accept-Encoding";
    # Servir con compresión
    gzip on;
    gzip_min_length 1000;
}

# Cache para imagenes (más tiempo)
location ~* \.(jpg|jpeg|png|gif|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header Vary "Accept-Encoding";
    
    # Compresión adicional para imágenes grandes
    gzip on;
    gzip_min_length 5000;
}

# Media folder (imágenes subidas por usuarios)
location /media/ {
    alias /path/to/proyecto/media/;
    
    # Cache por 30 días
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Vary "Accept-Encoding";
    
    # Permitir CORS para CDN
    add_header Access-Control-Allow-Origin "*";
    
    # Desabilitar indexing
    autoindex off;
}

# Headers de seguridad
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# ========== IMAGE OPTIMIZATION ==========
# Servir WebP con fallback automático
location ~ ^/media/(.*)\.jpg$ {
    try_files $1.webp $uri;
}

location ~ ^/media/(.*)\.png$ {
    try_files $1.webp $uri;
}

location ~ ^/static/(.*)\.jpg$ {
    try_files $1.webp $uri;
}

location ~ ^/static/(.*)\.png$ {
    try_files $1.webp $uri;
}
