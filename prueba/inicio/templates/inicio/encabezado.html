<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, user-scalable=yes, initial-scale=1, maximum-scale=5">
<title>{% block titulo %}{% endblock %}</title>

{% load static %}
<!-- Critical CSS inline para no bloquear renderizado -->
<style>
/* Reset y Layout base */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333333; }
.page-container { display: flex; }
.sidebar { flex: 0 0 250px; background: #2c3e50; color: #ffffff; }
.page-content { flex: 1; }
/* Contraste mejorado para accesibilidad */
a { color: #0056b3; text-decoration: underline; }
a:visited { color: #5a2d81; }
a:focus, a:active { outline: 2px solid #0056b3; outline-offset: 2px; }
button, input[type="button"], input[type="submit"] { background-color: #0056b3; color: white; }
button:focus, input[type="button"]:focus, input[type="submit"]:focus { outline: 2px solid #0056b3; }

/* Optimización de imágenes responsivas */
picture { display: contents; }
picture img, img.img-media, img.img-responsive {
    max-width: 100%; height: auto; object-fit: cover; object-position: center;
}
.user-menu img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; }
.table-bordered .text-center img { max-width: 100%; height: auto; display: block; }
img[loading="lazy"] { opacity: 0.8; }
img[loading="lazy"][src] { opacity: 1; }
</style>

<!-- CSS no crítico diferido -->
<link href="{% static 'inicio/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" media="print" onload="this.media='all'; this.onload=null;">
<link href="{% static 'inicio/css/londinium-theme.css' %}" rel="stylesheet" type="text/css" media="print" onload="this.media='all'; this.onload=null;">
<link href="{% static 'inicio/css/styles.css' %}" rel="stylesheet" type="text/css" media="print" onload="this.media='all'; this.onload=null;">
<link href="{% static 'inicio/css/icons.css' %}" rel="stylesheet" type="text/css" media="print" onload="this.media='all'; this.onload=null;">

<!-- Google Fonts también diferido -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700&amp;subset=latin,cyrillic-ext" rel="stylesheet" type="text/css" media="print" onload="this.media='all'; this.onload=null;">

<!-- Fallback para navegadores sin JS -->
<noscript>
  <link href="{% static 'inicio/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css">
  <link href="{% static 'inicio/css/londinium-theme.css' %}" rel="stylesheet" type="text/css">
  <link href="{% static 'inicio/css/styles.css' %}" rel="stylesheet" type="text/css">
  <link href="{% static 'inicio/css/icons.css' %}" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700&amp;subset=latin,cyrillic-ext" rel="stylesheet" type="text/css">
</noscript>

<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.1/jquery.min.js"></script>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.10.2/jquery-ui.min.js"></script>

</head>

<body>

	

 	<div class="page-container">


		<!-- Navegación lateral -->
		<div class="sidebar">
			<!-- Avatar del usuario -->
			<div class="user-menu dropdown">
				<a href="#">
					<!-- Avatar optimizado: 48x48px -->
					<picture>
						<img src="{%block imagen%}{%endblock%}" 
							 alt="Avatar del usuario" 
							 title="Perfil del usuario"
							 width="48" 
							 height="48"
							 loading="lazy">
					</picture>
					<div class="user-info">
						{%block span%}{%endblock%}
					</div>
				</a>
			</div>
			<!-- Avatar del usuario -->


			<div class="sidebar-content">
				<!-- Enlaces de navegación -->
				<ul class="navigation">
							<li><a href="{% url 'Principal' %}">Home</a></li>
							<li><a href="{% url 'Formulario' %}">Registrar</a></li>	
                            <li><a href="{% url 'Contacto' %}">Contactanos</a></li>
							<li><a href="{% url 'Comentarios' %}">Comentarios</a></li>
				</ul>
				<!-- Fin de enlaces de navegación -->
			</div>
		</div>
		<!-- Fin de la barra lateral -->
         

		
	</div>
	<!-- Área principal -->
	<main class="page-content">
		{% block encavezado%}{%endblock%}
			<li><a href="{%url 'Principal'%}">
				{%if request.path == '/'%}
					Principal
				{%else%}
					Principal{{request.path}}
				{%endif%}
			</a></li>
		</ol>
	</nav>
    
    
	
	<!-- Sección de contenido -->
    {% block contenido %}
    {% endblock %}

	</main>
	<!-- Fin del área principal -->

	<!-- SCRIPTS MOVIDOS AL FINAL PARA MEJORAR PAGESPEED -->
	<!-- Plugins de gráficos y formularios -->
	<script type="text/javascript" src="{% static 'inicio/js/plugins/charts/sparkline.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/uniform.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/select2.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/inputmask.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/autosize.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/inputlimit.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/listbox.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/multiselect.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/validate.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/tags.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/switch.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/uploader/plupload.full.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/uploader/plupload.queue.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/wysihtml5/wysihtml5.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/forms/wysihtml5/toolbar.js' %}" defer></script>

	<!-- Plugins de interfaz -->
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/daterangepicker.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/fancybox.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/moment.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/jgrowl.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/datatables.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/colorpicker.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/fullcalendar.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/plugins/interface/timepicker.min.js' %}" defer></script>

	<!-- Bootstrap y scripts principales -->
	<script type="text/javascript" src="{% static 'inicio/js/bootstrap.min.js' %}" defer></script>
	<script type="text/javascript" src="{% static 'inicio/js/application.js' %}" defer></script>

	<!-- Polyfill para cargar CSS diferido en navegadores sin soporte -->
	<script>
	(function() {
		// Cargar CSS que fue diferido con media="print"
		const links = document.querySelectorAll('link[media="print"][onload]');
		links.forEach(link => {
			const onLoadCode = link.getAttribute('onload');
			if (onLoadCode && onLoadCode.includes('media=')) {
				// Ya está configurado, ejecutar si es necesario
				link.media = 'all';
				link.onload = null;
			}
		});
	})();
	</script>
</body>
</html>
