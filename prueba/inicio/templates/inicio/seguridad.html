<!DOCTYPE html>
<html lang="en">
    <body>
        <form method="GET">
            Nombre:
            <input type="text" name="nombre">
            <input type="submit" value="Buscar">
        </form>

        <h2 >Resultado: {{nombre|safe}}</h2>

        <!-- Agregar un script para manejar la búsqueda -->
        <script type="application/javascript">
            var busqueda = new
            URLSearchParams(document.location.search);
            if(busqueda.has("nombre")){
               document.getElementById("resultado").innerHTML = "resultado : " + busqueda.get("nombre");
            }
        </script>
    </body>
</html>
